<svg width="172" height="172" viewBox="0 0 172 172" xmlns="http://www.w3.org/2000/svg">
  <!-- Zoo app icon. Flat, Bauhaus-minimal: a friendly "specimen" blob on a round ochre field,
       with one geometric companion to hint at a collection. Designed to stay legible at 86px. -->
  <defs>
    <radialGradient id="field" cx="42%" cy="36%" r="75%">
      <stop offset="0%"  stop-color="#F2C85C"/>
      <stop offset="100%" stop-color="#E1A42C"/>
    </radialGradient>
    <clipPath id="round">
      <circle cx="86" cy="86" r="86"/>
    </clipPath>
  </defs>

  <!-- Round field -->
  <g clip-path="url(#round)">
    <circle cx="86" cy="86" r="86" fill="url(#field)"/>
    <!-- subtle cabinet frame -->
    <circle cx="86" cy="86" r="79" fill="none" stroke="#FBF3DC" stroke-opacity="0.16" stroke-width="2"/>

    <!-- companion specimen (collection hint) -->
    <circle cx="128" cy="52" r="11" fill="#2A9D8F"/>

    <!-- grounding shadow -->
    <ellipse cx="84" cy="137" rx="35" ry="7" fill="#20233A" fill-opacity="0.18"/>

    <!-- blob body -->
    <path d="M84 49
             C106 47 128 63 127 88
             C126 107 117 121 99 128
             C91 131 79 132 69 128
             C51 121 44 104 45 86
             C46 63 62 51 84 49 Z"
          fill="#282C3D"/>

    <!-- eyes -->
    <circle cx="74" cy="85" r="9.5" fill="#F6EFDD"/>
    <circle cx="99" cy="83" r="9.5" fill="#F6EFDD"/>
    <circle cx="77" cy="86" r="3.8" fill="#1A1C26"/>
    <circle cx="101" cy="84" r="3.8" fill="#1A1C26"/>
    <circle cx="75.4" cy="84.2" r="1.3" fill="#F6EFDD"/>
    <circle cx="99.4" cy="82.2" r="1.3" fill="#F6EFDD"/>
  </g>
</svg>
